spring.application.name=ngoApp

# Default to a persistent embedded H2 database for one-click Render deploys.
# You can still override these with MySQL-compatible values through env vars.
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:/opt/render/project/data/ngo-db;MODE=MySQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}

server.port=${PORT:9090}

# Twilio is optional. Set these env vars when you want WhatsApp notifications enabled.
twilio.sid=${TWILIO_ACCOUNT_SID:}
twilio.token=${TWILIO_AUTH_TOKEN:}
twilio.whatsapp=${TWILIO_WHATSAPP_FROM:}

app.base.url=${APP_BASE_URL:https://ngo-volunteer-app.onrender.com}

# Admin credentials
admin.email=${ADMIN_EMAIL:admin@rsai.org}
admin.password=${ADMIN_PASSWORD:admin123}
