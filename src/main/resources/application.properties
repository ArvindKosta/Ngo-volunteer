spring.application.name=ngoApp

# Database Configuration (Hardcoded for Render/Docker)
# We use the service name 'ngo-db' defined in render.yaml
spring.datasource.url=jdbc:mysql://ngo-db:3306/ngo?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
# Explicitly set the dialect to avoid "Unable to determine Dialect" error
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.port=9090

